<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ZANDO – Your premium online shopping destination. Browse fashion, electronics, and more with an elegant shopping experience.">
  <meta name="keywords" content="ZANDO, shopping, fashion, online store, ecommerce">
  <meta name="author" content="ZANDO">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ZANDO – Elegant Shopping Experience">
  <meta property="og:description" content="Browse fashion, electronics, and more with ZANDO's elegant shopping experience.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ZANDO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#2e062b">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ZANDO – Elegant Shopping</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://js.stripe.com/v3/" defer></script>
</head>

  <script src="flutter_bootstrap.js" async></script>
