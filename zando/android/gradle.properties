org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation to fix cross-drive build crash on Windows
# (project on F: vs Pub cache on C: causes IllegalArgumentException in stripe_android)
kotlin.incremental=false
